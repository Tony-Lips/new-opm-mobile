<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>OPM ОТК Mobile PRO</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#3a3a3a">

<style>

:root{
--opm-yellow:#ffcc00;
--opm-dark:#3a3a3a;
--opm-bg:#e9e9e9;
--card:#ffffff;
--border:#d9e2ef;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--opm-bg);
}

.header{
background:var(--opm-dark);
color:#fff;
padding:12px;
position:sticky;
top:0;
z-index:1000;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.headerTop{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:32px;
height:32px;
background:#fff;
border-radius:4px;
display:flex;
align-items:center;
justify-content:center;
color:#000;
font-weight:bold;
}

.headerInfo{
font-size:12px;
margin-top:6px;
display:flex;
gap:15px;
flex-wrap:wrap;
}

.container{
padding:10px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:8px;
background:var(--opm-yellow);
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.card{
background:var(--card);
border-radius:12px;
padding:12px;
margin-top:10px;
box-shadow:0 2px 4px rgba(0,0,0,.08);
}

.tabs{
display:flex;
overflow:auto;
gap:5px;
margin-bottom:10px;
}

.tab{
padding:10px 14px;
background:#fff;
border-radius:8px;
white-space:nowrap;
border:1px solid #ddd;
cursor:pointer;
}

.tab.active{
background:var(--opm-yellow);
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

.checkItem{
border:1px solid #ddd;
border-radius:10px;
padding:10px;
margin-top:10px;
background:#fafafa;
}

.checkTitle{
font-weight:bold;
margin-bottom:5px;
}

.photoPreview{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.photoPreview img{
width:80px;
height:80px;
object-fit:cover;
border-radius:8px;
border:1px solid #ccc;
}

.footerSpace{
height:50px;
}

.statusOK{
color:#27ae60;
font-weight:bold;
}

.statusNOK{
color:#c0392b;
font-weight:bold;
}

@media(max-width:600px){

.headerInfo{
display:block;
line-height:1.5;
}

}

</style>

</head>

<body>

<div class="header">

<div class="headerTop">

<div class="logo">
OPM
</div>

<div>
<div><b>OPM ОТК Mobile PRO</b></div>
<div style="font-size:12px;">
Система входного контроля
</div>
</div>

</div>

<div class="headerInfo">

<div>
Статус:
<span id="statusSystem">ONLINE</span>
</div>

<div>
Акт:
<span id="actNumber"></span>
</div>

<div>
Пользователь:
<span id="userName"></span>
</div>

</div>

</div>

<div class="container">

<button class="btn" id="addPositionBtn">
➕ Добавить позицию
</button>

<button class="btn" id="createActBtn">
📄 Сформировать акт
</button>

<button class="btn" id="sendReportBtn">
📧 Рапорт руководителю ОТК
</button>

<div class="card">

<label>

<input type="checkbox"
id="multiPageAct"
checked>

Многостраничный акт

</label>

</div>

<div id="tabsContainer" class="tabs">

</div>

<div id="positionContainer">

</div>

<div class="card">

<h3>Сформированный акт</h3>

<pre id="reportOutput"></pre>

</div>

<div class="footerSpace"></div>

</div>

<script src="app.js"></script>

</body>
</html>
